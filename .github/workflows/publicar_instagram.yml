name: Publicar en Instagram - Salsas Bestial

on:
  schedule:
    # Lunes: 2 stories (10:00 AM y 10:30 AM Colombia)
    - cron: '0 15 * * 1'    # Lunes 10:00 AM — story 1
    - cron: '30 15 * * 1'   # Lunes 10:30 AM — story 2
    # Miércoles: post (12:00 PM Colombia)
    - cron: '0 17 * * 3'    # Miércoles 12:00 PM — post
    # Viernes: story 10:00 AM + post 12:00 PM Colombia
    - cron: '0 15 * * 5'    # Viernes 10:00 AM — story
    - cron: '0 17 * * 5'    # Viernes 12:00 PM — post
  workflow_dispatch:
    inputs:
      tipo:
        description: 'Tipo de publicación'
        required: true
        default: 'post'
        type: choice
        options:
          - post
          - story

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pillow schedule

      - name: Determinar tipo de publicación
        id: tipo
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tipo=${{ inputs.tipo }}" >> $GITHUB_OUTPUT
          else
            DIA=$(date +%u)    # 1=Lunes ... 7=Domingo
            MINUTO=$(date +%M) # minuto UTC
            HORA=$(date +%H)   # hora UTC
            if [ "$DIA" = "3" ]; then
              echo "tipo=post" >> $GITHUB_OUTPUT   # Miércoles siempre post
            elif [ "$DIA" = "5" ] && [ "$HORA" = "17" ]; then
              echo "tipo=post" >> $GITHUB_OUTPUT   # Viernes 12PM post
            else
              echo "tipo=story" >> $GITHUB_OUTPUT  # resto (Lunes x2, Viernes 10AM)
            fi
          fi

      # Para STORIES: preparar imagen y subirla a GitHub ANTES de publicar
      # Instagram necesita descargar la imagen desde una URL pública
      - name: Preparar imagen story y subir a GitHub
        if: steps.tipo.outputs.tipo == 'story'
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python publicar_instagram.py --preparar-story
          git config user.name "Bestial Bot"
          git config user.email "cgomeznavarrete@gmail.com"
          git add "Imagenes Instgram/"
          git diff --staged --quiet || git commit -m "Story preparada $(date +%Y%m%d)"
          git push
          echo "Esperando 20 segundos para que GitHub CDN propague la imagen..."
          sleep 20

      - name: Publicar en Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          GITHUB_REPO: ${{ github.repository }}
        run: python publicar_instagram.py --${{ steps.tipo.outputs.tipo }}

      - name: Guardar log de publicaciones
        run: |
          git config user.name "Bestial Bot"
          git config user.email "cgomeznavarrete@gmail.com"
          git add "Imagenes Instgram/publicaciones_log.json" "Imagenes Instgram/" || true
          git diff --staged --quiet || git commit -m "Publicacion Instagram: ${{ steps.tipo.outputs.tipo }} $(date +%Y%m%d)"
          git push
