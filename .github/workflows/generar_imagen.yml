name: Generar Imagen Diaria Bestial

on:
  # GENERACIÓN PAUSADA — reactivar cuando el proceso esté validado
  # schedule:
  #   - cron: '0 14 * * *'   # 9:00 AM Colombia (UTC-5)
  workflow_dispatch:        # Permite ejecutar manualmente desde GitHub

jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install anthropic google-genai pillow

      - name: Generar imagen del día
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python generar_imagen_diaria.py

      - name: Guardar imagen en el repositorio
        run: |
          git config user.name "Bestial Bot"
          git config user.email "cgomeznavarrete@gmail.com"
          git add "Imagenes Instgram/"
          git diff --staged --quiet || git commit -m "Imagen del día $(date +%Y%m%d)"
          git push
